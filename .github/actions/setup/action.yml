---
name: Set up environment

description: Set up environment for Bazel builds, including installing Visual C++ Build Tools on Windows if needed.

inputs:
  bazel-version:
    description: Bazel version
    required: true
  use-local-config-cc:
    description: Whether to use local_config_cc for C++ toolchain
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Visual C++ Build Tools
      if: ${{ runner.os == 'Windows' && inputs.use-local-config-cc == 'true' }}
      uses: ilammy/msvc-dev-cmd@v1
    - name: Set environment variables to use Visual C++ in Bazel
      if: ${{ runner.os == 'Windows' && inputs.use-local-config-cc == 'true' }}
      shell: bash
      run: |
        echo "BAZEL_VC=${VCINSTALLDIR}" >> "${GITHUB_ENV}"
    - name: Set DEVELOPMENT_BAZEL_VERSION
      shell: bash
      run: |
        echo "DEVELOPMENT_BAZEL_VERSION=${BAZEL_VERSION}" >> "${GITHUB_ENV}"
      env:
        BAZEL_VERSION: ${{ inputs.bazel-version }}
    - name: Place top-level .bazelversion file for bazelisk-cache, after checking there is no existing .bazelversion file
      shell: bash
      run: |
        if [ -f .bazelversion ]; then
          echo ".bazelversion file already exists in the repository. Please remove it to use this action."
          exit 1
        fi
        echo "${BAZEL_VERSION}" > .bazelversion
      env:
        BAZEL_VERSION: ${{ inputs.bazel-version }}
    - name: Install bazelisk
      uses: bazel-contrib/setup-bazel@0.19.0
      with:
        # Cache bazelisk downloads based on the .bazelversion file
        bazelisk-cache: true
        # Disable cache save for PRs to prevent PRs from polluting the cache
        cache-save: ${{ github.event_name != 'pull_request' }}
